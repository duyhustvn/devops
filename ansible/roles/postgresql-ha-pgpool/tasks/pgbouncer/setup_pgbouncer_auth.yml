---
# Tạo SECURITY DEFINER function public.pgbouncer_get_auth(text)
# trong template1, postgres và các database app để pgbouncer auth_query hoạt động
# với database mà client đang connect tới.
# Chỉ chạy trên primary (node-db-01) — các standby sẽ nhận qua streaming
# replication.

- name: Render setup_pgbouncer_auth.sql
  template:
    src: 'pgbouncer/setup_pgbouncer_auth.sql.j2'
    dest: '{{ pg_config_dir }}/setup_pgbouncer_auth.sql'
    mode: '0600'
    owner: postgres
    group: postgres

- name: Build pgbouncer auth database list
  set_fact:
    pgbouncer_auth_databases: "{{ (['template1', 'postgres'] + (pg_allowed_user_db | default([]) | map(attribute='db') | unique | list)) | unique | list }}"

- name: Install pgbouncer auth function in databases
  shell: |
    PGPASSWORD='{{ postgres_pass }}' psql -h localhost -p {{ pg_port }} -U postgres -d postgres \
      -v ON_ERROR_STOP=1 \
      -c 'GRANT CONNECT ON DATABASE "{{ item }}" TO {{ pgbouncer_auth_user }}'

    PGPASSWORD='{{ postgres_pass }}' psql -h localhost -p {{ pg_port }} -U postgres -d "{{ item }}" \
      -v ON_ERROR_STOP=1 -f {{ pg_config_dir }}/setup_pgbouncer_auth.sql
  loop: "{{ pgbouncer_auth_databases }}"
  no_log: true

- name: Remove setup_pgbouncer_auth.sql
  file:
    path: '{{ pg_config_dir }}/setup_pgbouncer_auth.sql'
    state: absent
