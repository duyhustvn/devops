---
# Tạo SECURITY DEFINER function public.pgbouncer_get_auth(text)
# trong template1, postgres và các database app để pgbouncer auth_query hoạt động
# với database mà client đang connect tới.
# Chỉ chạy trên primary (node-db-01) — các standby sẽ nhận qua streaming
# replication.

- name: Render setup_pgbouncer_auth.sql
  template:
    src: 'pgbouncer/setup_pgbouncer_auth.sql.j2'
    dest: '{{ pg_config_dir }}/setup_pgbouncer_auth.sql'
    mode: '0600'
    owner: postgres
    group: postgres

- name: Build pgbouncer auth database list
  set_fact:
    pgbouncer_auth_database_candidates: "{{ (['template1', 'postgres'] + (pg_allowed_user_db | default([]) | map(attribute='db') | map('trim') | unique | list)) | unique | list }}"

- name: Check pgbouncer auth databases exist
  shell: |
    psql -h localhost -p {{ pg_port }} -U postgres -d postgres \
      -v ON_ERROR_STOP=1 \
      -tAc "SELECT 1 FROM pg_database WHERE datname = '{{ item }}'"
  environment:
    PGPASSWORD: "{{ postgres_pass }}"
  register: pgbouncer_auth_database_checks
  changed_when: false
  loop: "{{ pgbouncer_auth_database_candidates }}"
  loop_control:
    label: "{{ item }}"

- name: Build existing pgbouncer auth database list
  set_fact:
    pgbouncer_auth_databases: "{{ pgbouncer_auth_database_checks.results | selectattr('stdout', 'equalto', '1') | map(attribute='item') | list }}"

- name: Show missing pgbouncer auth databases
  debug:
    msg: "Skip pgbouncer auth setup for missing databases: {{ pgbouncer_auth_database_checks.results | rejectattr('stdout', 'equalto', '1') | map(attribute='item') | list }}"
  when: (pgbouncer_auth_database_checks.results | rejectattr('stdout', 'equalto', '1') | list | length) > 0

- name: Install pgbouncer auth function in databases
  shell: |
    psql -h localhost -p {{ pg_port }} -U postgres -d postgres \
      -v ON_ERROR_STOP=1 \
      -c 'GRANT CONNECT ON DATABASE "{{ item }}" TO {{ pgbouncer_auth_user }}'

    psql -h localhost -p {{ pg_port }} -U postgres -d "{{ item }}" \
      -v ON_ERROR_STOP=1 -f {{ pg_config_dir }}/setup_pgbouncer_auth.sql
  environment:
    PGPASSWORD: "{{ postgres_pass }}"
  loop: "{{ pgbouncer_auth_databases }}"
  loop_control:
    label: "{{ item }}"

- name: Remove setup_pgbouncer_auth.sql
  file:
    path: '{{ pg_config_dir }}/setup_pgbouncer_auth.sql'
    state: absent
