---
# Cấu hình pgbouncer trên mỗi node:
#  - Setup auth_query function trong PostgreSQL (chỉ trên primary)
#  - Render userlist.txt với plaintext password chỉ cho auth_user nội bộ
#  - Render pgbouncer.ini
#  - Enable & start pgbouncer service

- name: Validate pgbouncer auth password
  assert:
    that:
      - pgbouncer_auth_password is defined
      - pgbouncer_auth_password | string | length > 0
    fail_msg: "Biến pgbouncer_auth_password phải được cấu hình để PgBouncer auth_user login PostgreSQL chạy auth_query."
  no_log: true

- name: Ensure pgbouncer auth role exists in PostgreSQL
  include_tasks: ensure_pgbouncer_user.yml
  when: postgresql_is_primary | default(false) | bool

- name: Setup pgbouncer auth function trong PostgreSQL
  include_tasks: setup_pgbouncer_auth.yml
  when: postgresql_is_primary | default(false) | bool

- name: Đảm bảo thư mục config pgbouncer tồn tại
  file:
    path: '{{ pgbouncer_config_dir }}'
    state: directory
    owner: postgres
    group: postgres
    mode: '0750'

- name: Render pgbouncer userlist.txt
  template:
    src: 'pgbouncer/userlist.txt.j2'
    dest: '{{ pgbouncer_config_dir }}/userlist.txt'
    owner: postgres
    group: postgres
    mode: '0600'
  notify: Reload PgBouncer
  no_log: true

- name: Render pgbouncer.ini
  template:
    src: 'pgbouncer/pgbouncer.ini.j2'
    dest: '{{ pgbouncer_config_dir }}/pgbouncer.ini'
    owner: postgres
    group: postgres
    mode: '0640'
  notify: Restart PgBouncer

- name: Đảm bảo thư mục unix socket /var/run/postgresql
  file:
    path: /var/run/postgresql
    state: directory
    owner: postgres
    group: postgres
    mode: '02775'

- name: Override systemd unit để pgbouncer chạy bằng user postgres
  # Mặc định gói pgbouncer chạy bằng user 'pgbouncer'. Trong cụm này ta đã
  # đồng nhất sở hữu config/log/socket sang user postgres để khớp với
  # unix_socket_dir = /var/run/postgresql.
  block:
    - name: Tạo thư mục drop-in cho pgbouncer.service
      file:
        path: /etc/systemd/system/pgbouncer.service.d
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Drop-in chỉ định User=postgres cho pgbouncer
      copy:
        dest: /etc/systemd/system/pgbouncer.service.d/override.conf
        content: |
          [Service]
          User=postgres
          Group=postgres
        owner: root
        group: root
        mode: '0644'
      notify:
        - Reload systemd
        - Restart PgBouncer

- name: Enable và start pgbouncer
  systemd:
    name: pgbouncer
    enabled: yes
    state: started
    daemon_reload: yes

- name: Apply PgBouncer config changes before configuring Pgpool
  meta: flush_handlers
