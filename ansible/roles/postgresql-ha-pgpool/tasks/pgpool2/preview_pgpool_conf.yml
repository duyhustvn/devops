---
- name: Render Pgpool config preview
  template:
    src: 'pgpool2/pgpool.conf.j2'
    dest: '{{ pgpool_conf_preview_path }}'
    mode: '0640'
    owner: root
    group: postgres

- name: Compare active Pgpool config with preview
  command:
    argv:
      - diff
      - -u
      - '{{ pgpool_config_dir }}/pgpool.conf'
      - '{{ pgpool_conf_preview_path }}'
  register: pgpool_conf_preview_diff
  changed_when: false
  failed_when: pgpool_conf_preview_diff.rc not in [0, 1]

- name: Show Pgpool config diff
  debug:
    msg: "{{ pgpool_conf_preview_diff.stdout_lines | default([]) }}"
  when: pgpool_conf_preview_diff.rc == 1

- name: Show Pgpool config preview status
  debug:
    msg: "No difference between {{ pgpool_config_dir }}/pgpool.conf and {{ pgpool_conf_preview_path }}"
  when: pgpool_conf_preview_diff.rc == 0
