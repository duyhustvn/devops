---
# tasks file for roles/postgresql-ha-pgpool

- name: Validate Ubuntu target
  assert:
    that:
      - ansible_distribution == "Ubuntu"
    fail_msg: "Role postgresql-ha-pgpool chỉ hỗ trợ Ubuntu."
  tags: [ always ]

- block:
    - name: Install PostgreSQL
      include_tasks: install/install_postgresql_debian.yml
  tags: [ install_postgresql, rc_all ]

- block:
    - name: Change data root
      include_tasks: psql/change_data_root.yml
  tags: [ change_data_root, rc_all ]

- block:
    - name: Install Pgpool2
      include_tasks: install/install_pgpool2_debian.yml
  tags: [ install_pgpool2, rc_all ]

- block:
    - name: Install PgBouncer
      include_tasks: install/install_pgbouncer_debian.yml
      when: pgbouncer_enabled | bool
  tags: [ install_pgbouncer, rc_all ]

- block:
    - name: Config ssh between servers
      include_tasks: ssh/setup_ssh.yml
  tags: [ config_ssh, rc_all ]

- block:
    - name: Detect PostgreSQL primary
      include_tasks: psql/detect_primary.yml
  tags: [ detect_primary, config_psql, config_pgbouncer, config_pgpool, rc_all ]

  # config_psql phải chạy trước config_pgbouncer khi bật pgbouncer vì cần:
  #   - user pgbouncer được tạo trong PostgreSQL (config_psql_user)
  #   - pg_hba cho phép pgbouncer kết nối
- block:
    - name: Config PostgreSQL
      include_tasks: psql/config_psql.yml
  tags: [ config_psql, rc_all ]

- block:
    - name: Preview PostgreSQL config
      include_tasks: psql/preview_postgresql_conf.yml
  tags: [ preview_postgresql_conf ]

  # config_pgbouncer phải chạy trước config_pgpool vì pgpool sẽ trỏ backend
  # tới pgbouncer port nếu pgbouncer_enabled = true.
- block:
    - name: Config PgBouncer
      include_tasks: pgbouncer/config_pgbouncer.yml
      when: pgbouncer_enabled | bool
  tags: [ config_pgbouncer, rc_all ]

- block:
    - name: Config pgpool
      include_tasks: pgpool2/config_pgpool.yml
  tags: [ config_pgpool, rc_all ]

- block:
    - name: Preview Pgpool config
      include_tasks: pgpool2/preview_pgpool_conf.yml
  tags: [ preview_pgpool_conf ]

