---
- name: Detect PostgreSQL primary for standby recovery
  include_tasks: psql/detect_primary.yml

- name: Recover standby nodes
  expect:
    command: "pcp_recovery_node -h {{ vip }} -p {{ pgpool_pcp_port }} -U {{ pgpool_pcp_user }} -n {{ hostvars[item].pgpool_node_id }} -W"
    responses:
      Password: "{{ pcp_pass }}\n"
  loop: "{{ groups['all'] | difference([inventory_hostname]) }}"
  loop_control:
    label: "{{ item }} (node_id={{ hostvars[item].pgpool_node_id }})"
  register: recover_standby_results
  when: postgresql_is_primary | default(false) | bool

- name: Show recovery results
  debug:
    var: recover_standby_results
  when: postgresql_is_primary | default(false) | bool
