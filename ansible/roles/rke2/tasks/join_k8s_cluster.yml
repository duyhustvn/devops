- block: # Download rke2 if not exists
    - name: Download rke2 if not exists
      include_tasks: download_artifact.yml
  tags: [download_rke2]

- block:
    - name: Step 1 - Sync rke2-artifacts to a temporary directory as regular user
      ansible.posix.synchronize:
        src: /home/vbox/Code/devops/ansible/roles/rke2/files/rke2-artifacts
        dest: /tmp/rke2-artifacts
      become: false 

    - name: Step 2 - Move artifacts to the final root destination
      ansible.builtin.copy:
        src: /tmp/rke2-artifacts/
        dest: /root/rke2-artifacts/
        remote_src: yes
        owner: root
        group: root
      become: true 
  tags: [sync_rke2_artifacts]

- block:
    # https://docs.rke2.io/advanced#configuring-an-http-proxy
    - name: Config proxy for rke2
      include_tasks: config_proxy.yml
  when: proxy is defined and proxy != ""

- block:
    - name: Running rke2 installation script
      shell: |
        INSTALL_RKE2_ARTIFACT_PATH=/root/rke2-artifacts sh install.sh
      args:
        chdir: /root/rke2-artifacts
      register: result

    - name: Show result of install rke2
      debug:
        var: result
  tags: [install_rke2]

- block: # Install and config keepalived for master only if have
    - name: Install and config keepalived
      include_tasks: keepalived.yml
  when: inventory_hostname in groups['master'] and vip is defined and vip != ''
  tags: [install_keepalived]

- block:
    - name: Create rke2 config directory at {{ rke2_config_dir }}
      file:
        path: "{{ rke2_config_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
    - name: Create Rke2 config.yml file
      template:
        src: "rke2/config.yaml.j2"
        dest: "{{ rke2_config_dir }}/config.yaml"
        mode: "0644"
        owner: root
        group: root
  tags: [config_rke2]

- name: Start Rke2 service
  systemd:
    name: "{{ 'rke2-server' if inventory_hostname in groups['master'] else 'rke2-agent' }}"
    state: started
    enabled: yes
  tags: [start_rke2]
