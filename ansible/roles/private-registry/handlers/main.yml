---
# handlers file for roles/private-registry

- name: Restart Docker
  systemd:
    name: docker
    state: restarted
    daemon_reload: yes

- name: Restart RKE2 Service
  systemd:
    name: "{{ 'rke2-server' if inventory_hostname in groups['master'] else 'rke2-agent' }}"
    state: restarted
    enabled: yes
