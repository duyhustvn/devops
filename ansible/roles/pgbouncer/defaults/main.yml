---
# defaults file for roles/pgbouncer

# Network settings
pgbouncer_listen_addr: "127.0.0.1"
pgbouncer_listen_port: 6432
pgbouncer_unix_socket_dir: /var/run/postgresql

# File paths
pgbouncer_logfile: /var/log/postgresql/pgbouncer.log
pgbouncer_pidfile: /var/run/postgresql/pgbouncer.pid
pgbouncer_config_dir: /etc/pgbouncer
pgbouncer_config_file: /etc/pgbouncer/pgbouncer.ini
pgbouncer_auth_file: /etc/pgbouncer/userlist.txt

# Authentication
pgbouncer_auth_type: md5

# Database entries
# Example:
#   pgbouncer_databases:
#     - name: mydb
#       config: "host=127.0.0.1 port=5432 dbname=mydb"
#     - name: "*"
#       config: "host=127.0.0.1"
pgbouncer_databases: []

# User-specific pool settings
# Example:
#   pgbouncer_users_list:
#     - name: user1
#       config: "pool_size=5 pool_mode=transaction"
pgbouncer_users_list: []

# User authentication list for userlist.txt
# Example:
#   pgbouncer_userlist:
#     - username: pgbouncer_admin
#       password: "md5abc123..."
pgbouncer_userlist: []

# Admin/stats users
pgbouncer_admin_users: []
pgbouncer_stats_users: []

# Pool settings
pgbouncer_pool_mode: session
pgbouncer_max_client_conn: 100
pgbouncer_default_pool_size: 20
pgbouncer_min_pool_size: 0
pgbouncer_reserve_pool_size: 0
pgbouncer_reserve_pool_timeout: 5
pgbouncer_max_db_connections: 0
pgbouncer_max_user_connections: 0

# Query/connection parameters
pgbouncer_server_reset_query: "DISCARD ALL"
pgbouncer_ignore_startup_parameters: ""
pgbouncer_max_prepared_statements: 0

# Timeout settings
pgbouncer_server_lifetime: 3600
pgbouncer_server_idle_timeout: 600
pgbouncer_server_connect_timeout: 15
pgbouncer_server_login_retry: 15
pgbouncer_query_timeout: 0
pgbouncer_query_wait_timeout: 120
pgbouncer_client_idle_timeout: 0
pgbouncer_client_login_timeout: 60
pgbouncer_idle_transaction_timeout: 0

# Logging settings
pgbouncer_log_connections: 1
pgbouncer_log_disconnections: 1
pgbouncer_log_pooler_errors: 1
pgbouncer_log_stats: 1
pgbouncer_verbose: 0
pgbouncer_syslog: 0
pgbouncer_syslog_facility: daemon
pgbouncer_syslog_ident: pgbouncer

# TLS settings (client)
pgbouncer_client_tls_sslmode: disable
pgbouncer_client_tls_ca_file: ""
pgbouncer_client_tls_key_file: ""
pgbouncer_client_tls_cert_file: ""

# TLS settings (server)
pgbouncer_server_tls_sslmode: prefer
pgbouncer_server_tls_ca_file: ""
pgbouncer_server_tls_key_file: ""
pgbouncer_server_tls_cert_file: ""

# systemd resource limits
# Set to 0 to use system default (typically 1024)
pgbouncer_limit_nofile: 65536

# Low-level tuning options
pgbouncer_pkt_buf: 4096
pgbouncer_listen_backlog: 128
pgbouncer_sbuf_loopcnt: 5
pgbouncer_max_packet_size: 2147483647
pgbouncer_so_reuseport: 0
pgbouncer_tcp_defer_accept: 0
pgbouncer_tcp_socket_buffer: 0
pgbouncer_tcp_keepalive: 1
pgbouncer_tcp_keepcnt: 0
pgbouncer_tcp_keepidle: 0
pgbouncer_tcp_keepintvl: 0
pgbouncer_tcp_user_timeout: 0
pgbouncer_dns_max_ttl: 15
pgbouncer_dns_zone_check_period: 0
pgbouncer_dns_nxdomain_ttl: 15
pgbouncer_resolv_conf: ""
