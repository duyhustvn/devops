---
# tasks file for roles/pgbouncer

- name: Install pgbouncer
  ansible.builtin.apt:
    name: pgbouncer
    state: present
    update_cache: true
  become: true
  tags:
    - pgbouncer
    - pgbouncer_install

- name: Deploy pgbouncer configuration
  ansible.builtin.template:
    src: pgbouncer.ini.j2
    dest: "{{ pgbouncer_config_file }}"
    owner: postgres
    group: postgres
    mode: "0640"
  become: true
  notify: Reload pgbouncer
  tags:
    - pgbouncer
    - pgbouncer_config

- name: Deploy pgbouncer userlist
  ansible.builtin.template:
    src: userlist.txt.j2
    dest: "{{ pgbouncer_auth_file }}"
    owner: postgres
    group: postgres
    mode: "0640"
  become: true
  no_log: true
  notify: Reload pgbouncer
  tags:
    - pgbouncer
    - pgbouncer_config
    - pgbouncer_userlist

- name: Create pgbouncer systemd override directory
  ansible.builtin.file:
    path: /etc/systemd/system/pgbouncer.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  when: pgbouncer_limit_nofile | int > 0
  tags:
    - pgbouncer
    - pgbouncer_systemd

- name: Configure pgbouncer systemd open files limit
  ansible.builtin.template:
    src: pgbouncer-override.conf.j2
    dest: /etc/systemd/system/pgbouncer.service.d/override.conf
    owner: root
    group: root
    mode: "0644"
  become: true
  when: pgbouncer_limit_nofile | int > 0
  notify:
    - Reload systemd daemon
    - Restart pgbouncer
  tags:
    - pgbouncer
    - pgbouncer_systemd

- name: Enable and start pgbouncer service
  ansible.builtin.service:
    name: pgbouncer
    state: started
    enabled: true
  become: true
  tags:
    - pgbouncer
    - pgbouncer_service
