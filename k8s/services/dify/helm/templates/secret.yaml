{{- /* Step 1: Build the secret name from the release fullname */ -}}
{{- $secretName := printf "%s-credentials" (include "dify.fullname" .) -}}

{{- /* Step 2: Look up the existing secret in the cluster (returns empty if not found) */ -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}

{{- /* Step 3: Generate a new random 32-char key as default */ -}}
{{- $sandboxApiKey := randAlphaNum 32 -}}

{{- /* Step 4: If secret already exists, reuse the existing key to avoid rotation on upgrade */ -}}
{{- if and $existingSecret (index $existingSecret.data "sandbox-api-key") -}}
  {{- $sandboxApiKey = index $existingSecret.data "sandbox-api-key" | b64dec -}}
{{- end -}}

apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
type: Opaque
data:
  sandbox-api-key: {{ $sandboxApiKey | b64enc }}
  plugin-daemon-key: "TODO" 
  plugin-dify-inner-api-key: "TODO" 

