image:
  registry: registry-1.docker.io
  repository: bitnami/redis
  tag: latest

architecture: replication
sentinel:
  enabled: true
  image:
    registry: registry-1.docker.io
    repository: bitnami/redis-sentinel
    tag: latest
  containerPorts:
    sentinel: 26379
  masterSet: redis-master # set master name

auth:
  enabled: true
  existingSecret: redis-secret
  sentinel: false

replica:
  kind: StatefulSet
  replicaCount: 3
  persistence:
    enabled: true
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  resources:
    limits:
      cpu: 16
      memory: 14Gi
    requests:
      cpu: 10m
      memory: 5Mi
  persistentVolumeClaimRetentionPolicy:
    enabled: true
    whenScaled: Retain
    whenDeleted: Retain
  nodeSelector:
    db: "true"
  tolerations:
    - key: db
      operator: Equal
      value: "true"
      effect: NoSchedule
